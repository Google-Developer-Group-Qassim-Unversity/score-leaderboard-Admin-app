name: Backend Tests

on:
  push:
    branches: [main]
    paths: ["Backend/**"]
  pull_request:
    branches: [main]
    paths: ["Backend/**"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest
