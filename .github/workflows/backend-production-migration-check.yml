name: Backend Production Migration Check

on:
  pull_request:
    branches: [main]
    paths: ["Backend/**"]

jobs:
  production-migration-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Check production DB is up to date
        env:
          DATABASE_URL: ${{ secrets.INFISICAL_ALEMBIC_DATABASE_URL }}
        run: uv run alembic check
